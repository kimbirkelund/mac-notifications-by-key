# Configures GitHub's auto-generated release notes (the changelog appended when a
# release is published with generate_release_notes: true). Categories group merged
# PRs by label; empty categories are omitted. PRs labelled `ignore` are excluded.
changelog:
  exclude:
    labels: [ignore]
  categories:
    - title: Features
      labels: [enhancement]
    - title: Fixes
      labels: [bug]
    - title: Documentation
      labels: [documentation]
    - title: Chore
      labels: [chore, dependencies]
    - title: Other Changes
      labels: ['*']
