name: CI

# macOS-only project (constraint C-5): the tool drives the macOS Notification
# Center via the Accessibility API, so every job runs on a macOS runner.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7.0.0

      # swift-format ships with the Swift toolchain; pin a recent Xcode so it and
      # swift-testing are available.
      - uses: maxim-lobanov/setup-xcode@v1.7.0
        with:
          xcode-version: latest-stable

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.18.0
          cache: npm

      # Installs the pinned prettier (build.ps1 -DoLint prefers node_modules/.bin).
      - name: Install dependencies
        run: npm ci

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable PSScriptAnalyzer)) {
            Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          }

      # swift-format + prettier (markdown/JSON/YAML) + PSScriptAnalyzer.
      - name: Lint
        shell: pwsh
        run: ./build.ps1 -DoLint

  # actionlint ships as a Docker container action (Linux-only), so it runs in its
  # own ubuntu job rather than alongside the macOS-bound swift-format lint.
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Lint GitHub workflows (actionlint)
        uses: reviewdog/action-actionlint@v1.72.0
        with:
          fail_level: error

  build:
    name: build (release, universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: maxim-lobanov/setup-xcode@v1.7.0
        with:
          xcode-version: latest-stable

      # Compiles the universal (arm64 + x86_64) release binary the Release workflow
      # ships — catches release-config and cross-arch breakage on every push/PR.
      - name: Build universal release binary
        shell: pwsh
        run: ./build.ps1 -DoBuild -Universal -Configuration release

  test:
    name: test (unit)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: maxim-lobanov/setup-xcode@v1.7.0
        with:
          xcode-version: latest-stable

      # Unit tier only. The AX-integration and acceptance tiers require
      # Accessibility trust and a real, on-screen Notification Center, which
      # hosted runners cannot provide — they run locally (see docs/testing.md).
      - name: Build and test (unit)
        shell: pwsh
        run: ./build.ps1 -DoTest -Kinds Unit

  # Single aggregate gate: this is the only check the branch ruleset requires, so
  # every job above is gated and new jobs added to `needs` are covered without
  # touching the ruleset. (GitHub's native "require workflow" rule is org-only.)
  ci-success:
    name: ci-success
    needs: [lint, actionlint, build, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs succeeded
        run: |
          echo "results: lint=${{ needs.lint.result }} actionlint=${{ needs.actionlint.result }} build=${{ needs.build.result }} test=${{ needs.test.result }}"
          if ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}; then
            echo "::error::One or more required jobs did not succeed."
            exit 1
          fi
