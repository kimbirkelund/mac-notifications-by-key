name: Tag release candidate

# Manually-triggered from an rc/* branch (pick the branch in the "Run workflow"
# dropdown). Tags the branch HEAD via nbgv (release/v<version>), pushes the tag to
# fire the Release workflow, then deletes the RC branch.
#
# NOTE: pushing the tag with the default GITHUB_TOKEN does NOT trigger the Release
# workflow. Provide a PAT_RELEASE secret (PAT/App token) so the tag push fires
# release.yml; it falls back to github.token only when unset.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag-rc:
    name: tag-rc
    runs-on: ubuntu-latest
    steps:
      - name: Guard against non-RC branches
        run: |
          case "$GITHUB_REF_NAME" in
            rc/*) ;;
            *) echo "This workflow must be dispatched from an rc/* branch (got '$GITHUB_REF_NAME')." >&2; exit 1 ;;
          esac

      - uses: actions/checkout@v7.0.0
        with:
          # nbgv needs full history; the configured token is reused for pushes.
          fetch-depth: 0
          token: ${{ secrets.PAT_RELEASE || github.token }}

      - uses: actions/setup-dotnet@v6.0.0
        with:
          dotnet-version: 10.0.x

      - name: Install nbgv
        run: |
          dotnet tool install --global nbgv
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # nbgv tag names the tag per release.tagName (release/v{version}); capture the
      # tag it actually created rather than reconstruct the version string.
      - name: Tag with nbgv
        id: tag
        run: |
          nbgv tag
          tag=$(git tag --points-at HEAD --list 'release/v*' | tail -n1)
          if [ -z "$tag" ]; then
            echo "nbgv tag did not create a release/v* tag on HEAD." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Push tag
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: git push origin "refs/tags/$TAG"

      - name: Delete RC branch
        run: git push origin --delete "$GITHUB_REF_NAME"
