name: Release

# Build a universal macOS binary and publish it to a GitHub Release. Triggered by
# pushing a release tag like `release/v1.2.3`; the version itself is computed by
# nbgv from git state (version.json + git height), not parsed from the tag name.
# The published tarball + SHA256 are what the Homebrew formula consumes (see
# packaging/homebrew/nbk.rb).
on:
  push:
    tags:
      - 'release/v*'

permissions:
  contents: write

jobs:
  release:
    name: release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          # nbgv derives the version from git height, so it needs full history.
          fetch-depth: 0

      - uses: maxim-lobanov/setup-xcode@v1.7.0
        with:
          xcode-version: latest-stable

      # nbgv runs as a .NET tool; hosted macOS runners don't guarantee a runtime.
      - uses: actions/setup-dotnet@v6.0.0
        with:
          dotnet-version: 10.0.x

      # Deterministic version from git state (version.json + git height) rather than
      # the tag name. Exposes fields like NpmPackageVersion as step outputs.
      - name: Compute version (nbgv)
        id: v
        uses: dotnet/nbgv@v0.5.2

      # Gate the release on the unit tier (the AX/acceptance tiers can't run on a
      # hosted runner — no Accessibility trust).
      - name: Unit tests
        shell: pwsh
        run: ./build.ps1 -DoTest -Kinds Unit

      - name: Package universal binary
        shell: pwsh
        run: ./build.ps1 -DoPackage -Version "${{ steps.v.outputs.NpmPackageVersion }}"

      - name: Read SHA256
        id: sha
        run: |
          file="dist/nbk-${{ steps.v.outputs.NpmPackageVersion }}-macos-universal.tar.gz.sha256"
          echo "sha256=$(cut -d' ' -f1 "$file")" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3.0.2
        with:
          files: |
            dist/nbk-*-macos-universal.tar.gz
            dist/nbk-*-macos-universal.tar.gz.sha256
          body: |
            Universal (arm64 + x86_64) macOS build of `nbk`.

            Homebrew formula values for this release:

            ```
            url     https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/nbk-${{ steps.v.outputs.NpmPackageVersion }}-macos-universal.tar.gz
            sha256  ${{ steps.sha.outputs.sha256 }}
            version ${{ steps.v.outputs.NpmPackageVersion }}
            ```
